spring.application.name=acme-spiele
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Spring Data REST Configuration
spring.data.rest.basePath=/api
spring.data.rest.defaultPageSize=20
spring.data.rest.pagingBackend=true
spring.data.rest.returnBodyOnPostForCollections=true
spring.data.rest.returnBodyOnPutAndPost=true
